<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamados por Vertical — Betha Sistemas</title>
<style>
  :root {
    --blue-primary:   #003F8A;
    --blue-dark:      #002C62;
    --blue-light:     #E6EEF9;
    --blue-mid:       #1565C0;
    --orange:         #F5821F;
    --orange-light:   #FEF0E3;
    --orange-dark:    #C9610A;
    --gray-bg:        #F4F6FA;
    --gray-border:    #DDE3EE;
    --text-primary:   #1A2340;
    --text-secondary: #5A6680;
    --white:          #FFFFFF;
    --green:          #2E7D32;
    --green-light:    #E8F5E9;
    --red:            #C62828;
    --red-light:      #FFEBEE;
    --yellow-light:   #FFF8E1;
    --shadow-sm:      0 1px 4px rgba(0,63,138,.10);
    --shadow-md:      0 4px 16px rgba(0,63,138,.13);
    --radius:         12px;
    --radius-sm:      8px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--gray-bg); color: var(--text-primary); min-height: 100vh; }
  header { background: var(--blue-primary); color: var(--white); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,.18); position: sticky; top: 0; z-index: 100; }
  .header-brand { display: flex; align-items: center; gap: 12px; }
  .header-logo { width: 36px; height: 36px; border-radius: 8px; background: var(--orange); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 18px; color: var(--white); flex-shrink: 0; }
  .header-title { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .header-subtitle { font-size: 11px; opacity: .75; font-weight: 400; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .status-badge { background: #00C851; color: #fff; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 99px; letter-spacing: .04em; }
  .btn-notif { background: rgba(255,255,255,.15); border: 1.5px solid rgba(255,255,255,.3); color: #fff; border-radius: var(--radius-sm); padding: 6px 13px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
  .btn-notif:hover { background: rgba(255,255,255,.25); }
  .btn-notif.active { background: var(--orange); border-color: var(--orange-dark); }
  .btn-notif .dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
  .btn-notif.active .dot { background: #fff; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
  #toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--blue-dark); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; box-shadow: var(--shadow-md); opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; white-space: nowrap; }
  #toast.show { opacity: 1; }
  .new-issues-banner { background: var(--orange-light); border: 1.5px solid var(--orange); border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 16px; font-size: 13px; font-weight: 600; color: var(--orange-dark); display: flex; align-items: center; gap: 8px; animation: fadeIn .4s; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }
  main { max-width: 1100px; margin: 0 auto; padding: 28px 20px 48px; }
  .filter-card { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--gray-border); box-shadow: var(--shadow-sm); padding: 20px 24px; margin-bottom: 24px; }
  .filter-card h2 { font-size: 15px; font-weight: 700; color: var(--blue-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .filter-card h2::before { content: ''; display: inline-block; width: 4px; height: 18px; border-radius: 2px; background: var(--orange); }
  .filters-grid { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
  @media (max-width: 700px) { .filters-grid { grid-template-columns: 1fr 1fr; } }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .05em; }
  .form-group select, .form-group input { border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; color: var(--text-primary); background: var(--white); outline: none; transition: border-color .15s; width: 100%; }
  .form-group select:focus, .form-group input:focus { border-color: var(--blue-mid); }
  .autocomplete-wrap { position: relative; }
  .autocomplete-list { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--white); border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); z-index: 50; max-height: 220px; overflow-y: auto; display: none; }
  .autocomplete-list.open { display: block; }
  .autocomplete-item { padding: 9px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--gray-bg); display: flex; flex-direction: column; gap: 2px; }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.selected { background: var(--blue-light); }
  .autocomplete-item span { font-size: 11px; color: var(--text-secondary); }
  .btn-buscar { background: var(--blue-primary); color: var(--white); border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-size: 13px; font-weight: 700; cursor: pointer; transition: background .15s; white-space: nowrap; height: 40px; }
  .btn-buscar:hover { background: var(--blue-dark); }
  .btn-buscar:disabled { opacity: .5; cursor: not-allowed; }
  .summary-chips { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .chip { background: var(--white); border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); padding: 8px 16px; font-size: 13px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 8px; }
  .chip-num { font-size: 20px; font-weight: 800; color: var(--blue-primary); }
  .chip-label { font-size: 11px; color: var(--text-secondary); font-weight: 600; }
  .chip.orange .chip-num { color: var(--orange-dark); }
  .chip.green .chip-num { color: var(--green); }
  .section { background: var(--white); border-radius: var(--radius); border: 1.5px solid var(--gray-border); box-shadow: var(--shadow-sm); margin-bottom: 16px; overflow: hidden; }
  .section-header { padding: 14px 20px; border-bottom: 1px solid var(--gray-border); display: flex; align-items: center; gap: 10px; }
  .section-header h3 { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .tag { display: inline-flex; align-items: center; padding: 2px 10px; border-radius: 99px; font-size: 11px; font-weight: 700; margin-left: auto; }
  .tag-warning { background: var(--yellow-light); color: #7B5800; }
  .tag-blue { background: var(--blue-light); color: var(--blue-primary); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; padding: 10px 14px; font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .05em; background: var(--gray-bg); border-bottom: 1px solid var(--gray-border); white-space: nowrap; }
  tbody td { padding: 11px 14px; border-bottom: 1px solid #F3F5FA; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #F8FAFF; }
  .key-link { color: var(--blue-mid); text-decoration: none; font-weight: 700; font-size: 12px; }
  .key-link:hover { text-decoration: underline; }
  .pri-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; }
  .pri-1 { background: var(--red-light); color: var(--red); }
  .pri-2 { background: var(--yellow-light); color: #7B5800; }
  .pri-3 { background: #F3F4F6; color: var(--text-secondary); }
  .pri-4 { background: #F3F4F6; color: var(--text-secondary); }
  .status-pill { display: inline-block; padding: 3px 9px; border-radius: 5px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .state { text-align: center; padding: 36px; color: var(--text-secondary); font-size: 13px; }
  .state-icon { font-size: 32px; margin-bottom: 8px; }
  .spinner { width: 24px; height: 24px; border: 3px solid var(--blue-light); border-top-color: var(--blue-primary); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .placeholder-msg { text-align: center; padding: 60px 20px; color: var(--text-secondary); font-size: 14px; }
  .placeholder-msg .big { font-size: 40px; margin-bottom: 10px; }
  .inp-warn { border-color: var(--orange) !important; }
  .inp-warn::placeholder { color: var(--orange-dark); }
  .form-group .inp-hint { font-size: 11px; color: var(--orange-dark); margin-top: 3px; display: none; }
  .inp-warn ~ .inp-hint, input.inp-warn + input + .inp-hint { display: block; }
  /* Segunda linha de filtros */
  .filters-grid-2 { display: grid; grid-template-columns: 1fr auto; gap: 12px; align-items: end; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gray-border); }
  /* Multi-select de tipos */
  .multiselect-wrap { position: relative; }
  .multiselect-btn { width: 100%; border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); padding: 9px 12px; font-size: 13px; color: var(--text-primary); background: var(--white); cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: border-color .15s; }
  .multiselect-btn:hover, .multiselect-btn.open { border-color: var(--blue-mid); }
  .multiselect-btn .arrow { font-size: 10px; color: var(--text-secondary); transition: transform .15s; }
  .multiselect-btn.open .arrow { transform: rotate(180deg); }
  .multiselect-badge { background: var(--blue-primary); color: #fff; border-radius: 99px; padding: 1px 7px; font-size: 11px; font-weight: 700; margin-left: 6px; }
  .multiselect-dropdown { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: var(--white); border: 1.5px solid var(--gray-border); border-radius: var(--radius-sm); box-shadow: var(--shadow-md); z-index: 50; display: none; }
  .multiselect-dropdown.open { display: block; }
  .multiselect-actions { display: flex; gap: 8px; padding: 8px 12px; border-bottom: 1px solid var(--gray-bg); }
  .multiselect-actions button { font-size: 11px; color: var(--blue-mid); background: none; border: none; cursor: pointer; padding: 0; font-weight: 600; }
  .multiselect-actions button:hover { text-decoration: underline; }
  .multiselect-items { max-height: 220px; overflow-y: auto; padding: 4px 0; }
  .multiselect-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; font-size: 13px; }
  .multiselect-item:hover { background: var(--gray-bg); }
  .multiselect-item input[type=checkbox] { accent-color: var(--blue-primary); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
</style>
</head>
<body>

<header>
  <div class="header-brand">
    <div class="header-logo">B</div>
    <div>
      <div class="header-title">Chamados por Vertical</div>
      <div class="header-subtitle">Betha Sistemas — Portfólio de Atendimento</div>
    </div>
  </div>
  <div class="header-right">
    <button class="btn-notif" id="btn-notif" onclick="toggleNotificacoes()">
      <span class="dot"></span>
      <span id="notif-label">Ativar alertas</span>
    </button>
    <span class="status-badge">Online</span>
  </div>
</header>
<div id="toast"></div>

<main>
  <div class="filter-card">
    <h2>Filtros</h2>
    <div class="filters-grid">
      <div class="form-group">
        <label>Portfólio</label>
        <select id="sel-portfolio">
          <option value="">Todos os portfólios</option>
          <option value="Portfólio Pequenas Contas">Pequenas Contas</option>
          <option value="Portfólio Médias Contas">Médias Contas</option>
          <option value="Portfólio SC/MG">SC/MG</option>
          <option value="Portfólio SC/SP">SC/SP</option>
        </select>
      </div>
      <div class="form-group">
        <label>Vertical</label>
        <select id="sel-vertical">
          <option value="">Todas as verticais</option>
          <option value="Arrecadação">Arrecadação</option>
          <option value="Atendimento">Atendimento</option>
          <option value="Compras/Contratos">Compras/Contratos</option>
          <option value="Contábil">Contábil</option>
          <option value="Educação">Educação</option>
          <option value="Pessoal">Pessoal</option>
          <option value="Saúde">Saúde</option>
        </select>
      </div>
      <div class="form-group">
        <label>Responsável</label>
        <div class="autocomplete-wrap">
          <input type="text" id="inp-user" placeholder="Digite o nome ou e-mail..." autocomplete="off">
          <input type="hidden" id="inp-user-val">
          <div class="autocomplete-list" id="autocomplete-list"></div>
          <span class="inp-hint">Selecione um usuário da lista</span>
        </div>
      </div>
      <button class="btn-buscar" id="btn-buscar" onclick="buscar()">🔍 Buscar</button>
    </div>

    <div class="filters-grid-2">
      <div class="form-group">
        <label>Tipo de chamado</label>
        <div class="multiselect-wrap" id="tipo-wrap">
          <button type="button" class="multiselect-btn" id="tipo-btn" onclick="toggleTipoDropdown()">
            <span id="tipo-label">Todos os tipos</span>
            <span class="arrow">▼</span>
          </button>
          <div class="multiselect-dropdown" id="tipo-dropdown">
            <div class="multiselect-actions">
              <button onclick="selecionarTodosTipos()">Selecionar todos</button>
              <button onclick="limparTipos()">Limpar</button>
            </div>
            <div class="multiselect-items" id="tipo-items"></div>
          </div>
        </div>
      </div>
      <div></div>
    </div>
  </div>

  <div class="summary-chips" id="chips" style="display:none">
    <div class="chip"><div><div class="chip-num" id="chip-total">0</div><div class="chip-label">Total</div></div></div>
    <div class="chip orange"><div><div class="chip-num" id="chip-unassigned">0</div><div class="chip-label">Sem responsável</div></div></div>
    <div class="chip green"><div><div class="chip-num" id="chip-mine">0</div><div class="chip-label">Do responsável selecionado</div></div></div>
  </div>

  <div id="results">
    <div class="placeholder-msg">
      <div class="big">🔍</div>
      Selecione os filtros e clique em <strong>Buscar</strong> para ver os chamados.
    </div>
  </div>
</main>

<script>
var acTimeout = null;
var selectedUser = null;
var notifAtivo = false;
var knownKeys = [];
try { knownKeys = JSON.parse(localStorage.getItem('notif_knownKeys') || '[]'); } catch(e) {}

var inpUser = document.getElementById('inp-user');
var inpUserVal = document.getElementById('inp-user-val');
var acList = document.getElementById('autocomplete-list');

// ── SEGURANÇA: escape de HTML para prevenir XSS ───────────────────────────────
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── BADGE DE STATUS DINÂMICO ─────────────────────────────────────────────────
function setBadge(online) {
  var badge = document.getElementById('status-badge');
  badge.textContent = online ? 'Online' : 'Offline';
  badge.style.background = online ? '#00C851' : '#e53935';
}
fetch('/api/chamados?vertical=Contábil&portfolio=Portfólio Pequenas Contas')
  .then(function(r) { setBadge(r.ok); })
  .catch(function() { setBadge(false); });

// ── AUTOCOMPLETE ─────────────────────────────────────────────────────────────
inpUser.addEventListener('input', function() {
  clearTimeout(acTimeout);
  selectedUser = null;
  inpUserVal.value = '';
  inpUser.classList.remove('inp-warn');
  var q = inpUser.value.trim();
  if (q.length < 2) { acList.classList.remove('open'); return; }
  acTimeout = setTimeout(function() { fetchUsuarios(q); }, 300);
});

// Fecha ao clicar fora — usando blur apenas quando o foco não vai para a lista
inpUser.addEventListener('blur', function() {
  setTimeout(function() {
    if (!acList.contains(document.activeElement)) {
      acList.classList.remove('open');
      // Avisa se o usuário digitou algo mas não selecionou da lista
      if (inpUser.value.trim() && !inpUserVal.value) {
        inpUser.classList.add('inp-warn');
      }
    }
  }, 150);
});

inpUser.addEventListener('focus', function() {
  inpUser.classList.remove('inp-warn');
});

inpUser.addEventListener('keydown', function(e) {
  var items = acList.querySelectorAll('.autocomplete-item');
  var arr = Array.prototype.slice.call(items);
  var idx = arr.findIndex(function(i) { return i.classList.contains('selected'); });
  if (e.key === 'ArrowDown') { e.preventDefault(); setAcFocus(items, idx + 1); }
  if (e.key === 'ArrowUp')   { e.preventDefault(); setAcFocus(items, idx - 1); }
  if (e.key === 'Enter' && idx >= 0) { e.preventDefault(); items[idx].click(); }
  if (e.key === 'Escape') { acList.classList.remove('open'); inpUser.blur(); }
});

function setAcFocus(items, idx) {
  Array.prototype.forEach.call(items, function(i) { i.classList.remove('selected'); });
  if (idx >= 0 && idx < items.length) items[idx].classList.add('selected');
}

function fetchUsuarios(q) {
  fetch('/api/usuarios?q=' + encodeURIComponent(q))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var users = data.users || [];
      acList.innerHTML = '';
      if (!users.length) { acList.classList.remove('open'); return; }
      users.forEach(function(u) {
        var item = document.createElement('div');
        item.className = 'autocomplete-item';
        // mousedown antes do blur — previne que a lista feche antes do click
        item.addEventListener('mousedown', function(e) { e.preventDefault(); });
        item.addEventListener('click', function() {
          selectedUser = u;
          inpUser.value = u.displayName;
          inpUserVal.value = u.name;
          inpUser.classList.remove('inp-warn');
          acList.classList.remove('open');
        });
        // Usa textContent para evitar XSS com dados do Jira
        var nameEl = document.createElement('span');
        nameEl.textContent = u.displayName;
        var emailEl = document.createElement('span');
        emailEl.style.fontSize = '11px';
        emailEl.style.color = 'var(--text-secondary)';
        emailEl.textContent = u.email;
        item.appendChild(nameEl);
        item.appendChild(emailEl);
        acList.appendChild(item);
      });
      acList.classList.add('open');
    })
    .catch(function() { acList.classList.remove('open'); });
}

// ── MULTI-SELECT TIPOS ───────────────────────────────────────────────────────
var TIPOS = [
  'Incidente', 'Dúvida', 'Acompanhamento técnico', 'Configuração',
  'Customização', 'Tratamento de dados', 'Treinamento', 'Serviço',
  'Atualização de legislação', 'Permissão de Acesso', 'Comunicação ao Cliente'
];
var tiposSelected = new Set(); // vazio = todos

(function initTipos() {
  var container = document.getElementById('tipo-items');
  TIPOS.forEach(function(tipo) {
    var label = document.createElement('label');
    label.className = 'multiselect-item';
    var cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = tipo;
    cb.addEventListener('change', function() {
      if (cb.checked) tiposSelected.add(tipo);
      else tiposSelected.delete(tipo);
      atualizarTipoLabel();
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(tipo));
    container.appendChild(label);
  });
})();

function toggleTipoDropdown() {
  var btn = document.getElementById('tipo-btn');
  var dd  = document.getElementById('tipo-dropdown');
  btn.classList.toggle('open');
  dd.classList.toggle('open');
}

function selecionarTodosTipos() {
  tiposSelected.clear();
  document.querySelectorAll('#tipo-items input[type=checkbox]').forEach(function(cb) {
    cb.checked = false;
  });
  atualizarTipoLabel();
}

function limparTipos() { selecionarTodosTipos(); }

function atualizarTipoLabel() {
  var label = document.getElementById('tipo-label');
  var btn   = document.getElementById('tipo-btn');
  if (tiposSelected.size === 0) {
    label.innerHTML = 'Todos os tipos';
    var badge = btn.querySelector('.multiselect-badge');
    if (badge) badge.remove();
  } else {
    label.textContent = tiposSelected.size === 1
      ? [...tiposSelected][0]
      : tiposSelected.size + ' tipos';
    var existing = btn.querySelector('.multiselect-badge');
    if (!existing) {
      var b = document.createElement('span');
      b.className = 'multiselect-badge';
      btn.querySelector('.arrow').before(b);
    }
    btn.querySelector('.multiselect-badge').textContent = tiposSelected.size;
  }
}

// Fecha dropdown ao clicar fora
document.addEventListener('click', function(e) {
  var wrap = document.getElementById('tipo-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('tipo-btn').classList.remove('open');
    document.getElementById('tipo-dropdown').classList.remove('open');
  }
});

// ── BUSCA ────────────────────────────────────────────────────────────────────
function buscar() {
  var vertical  = document.getElementById('sel-vertical').value;
  var portfolio = document.getElementById('sel-portfolio').value;
  var user      = inpUserVal.value;

  // Exige pelo menos 2 filtros preenchidos
  var preenchidos = [vertical, portfolio, user].filter(Boolean).length;
  if (preenchidos < 2) {
    document.getElementById('results').innerHTML =
      '<div class="state"><div class="state-icon">⚠️</div>' +
      'Selecione pelo menos <strong>2 filtros</strong> antes de buscar.<br>' +
      '<span style="font-size:12px;margin-top:6px;display:block">Portfólio, Vertical e/ou Responsável.</span></div>';
    document.getElementById('chips').style.display = 'none';
    return;
  }

  var params = new URLSearchParams();
  if (vertical)  params.set('vertical',  vertical);
  if (portfolio) params.set('portfolio', portfolio);
  if (user)      params.set('user',      user);
  if (tiposSelected.size > 0) params.set('types', [...tiposSelected].join(','));

  var btn = document.getElementById('btn-buscar');
  btn.disabled = true;
  btn.textContent = 'Buscando...';
  document.getElementById('chips').style.display = 'none';
  document.getElementById('results').innerHTML =
    '<div class="state"><div class="spinner"></div>Buscando chamados no Jira...</div>';

  fetch('/api/chamados?' + params.toString())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.ok) throw new Error(data.error || 'Erro desconhecido');
      renderResults(data, user);
      syncKnownKeys();
    })
    .catch(function(err) {
      document.getElementById('results').innerHTML =
        '<div class="state"><div class="state-icon">⚠️</div><strong>Erro ao buscar:</strong> ' + escHtml(err.message) + '</div>';
    })
    .finally(function() {
      btn.disabled = false;
      btn.textContent = '🔍 Buscar';
    });
}

document.querySelectorAll('select').forEach(function(el) {
  el.addEventListener('keydown', function(e) { if (e.key === 'Enter') buscar(); });
});

// ── RENDERIZAÇÃO ─────────────────────────────────────────────────────────────
var STATUS_BG = {
  'Aguardando Manutencao': '#FFF8E1',
  'Aguardando Manutenção': '#FFF8E1',
  'Aguardando aprovacao do solicitante': '#E3F2FD',
  'Aguardando aprovação do solicitante': '#E3F2FD',
  'Em andamento': '#E8F5E9',
  'Nao iniciada': '#F3F4F6',
  'Não iniciada': '#F3F4F6',
  'Aberto': '#EDE9FE',
  'Reaberto': '#FFEBEE'
};
var STATUS_COLOR = {
  'Aguardando Manutencao': '#7B5800',
  'Aguardando Manutenção': '#7B5800',
  'Aguardando aprovacao do solicitante': '#1565C0',
  'Aguardando aprovação do solicitante': '#1565C0',
  'Em andamento': '#2E7D32',
  'Nao iniciada': '#5A6680',
  'Não iniciada': '#5A6680',
  'Aberto': '#4527A0',
  'Reaberto': '#C62828'
};

function statusPill(s) {
  return '<span class="status-pill" style="background:' + (STATUS_BG[s] || '#F3F4F6') + ';color:' + (STATUS_COLOR[s] || '#5A6680') + '">' + s + '</span>';
}

function priBadge(p) {
  var map = {'Highest':'1','High':'2','Medium':'3','Low':'4','Lowest':'4','1':'1','2':'2','3':'3','4':'4','5':'4'};
  var n = map[p] || '3';
  return '<span class="pri-badge pri-' + n + '">P' + n + '</span>';
}

function fmtDate(iso) {
  if (!iso) return '--';
  var d = new Date(iso);
  return d.toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) + ' ' +
         d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
}

function renderTable(issues) {
  if (!issues.length) return '<div class="state"><div class="state-icon">✅</div>Nenhum chamado no momento.</div>';
  var rows = issues.map(function(i) {
    // Validação da URL: só permite https:// para prevenir javascript: injection
    var safeUrl = (typeof i.url === 'string' && i.url.startsWith('https://'))
      ? escHtml(i.url) : '#';
    return '<tr>' +
      '<td><a class="key-link" href="' + safeUrl + '" target="_blank" rel="noopener noreferrer">' + escHtml(i.key) + '</a></td>' +
      '<td style="max-width:340px">' + escHtml(i.summary) + '</td>' +
      '<td>' + statusPill(i.status) + '</td>' +
      '<td>' + priBadge(i.priority) + '</td>' +
      '<td style="font-size:12px;color:var(--text-secondary)">' + escHtml(i.type) + '</td>' +
      '<td style="font-size:11px;color:var(--text-secondary);white-space:nowrap">' + fmtDate(i.updated) + '</td>' +
      '</tr>';
  }).join('');
  return '<div class="table-wrap"><table>' +
    '<thead><tr><th>Chamado</th><th>Resumo</th><th>Status</th><th>Prior.</th><th>Tipo</th><th>Atualizado</th></tr></thead>' +
    '<tbody>' + rows + '</tbody></table></div>';
}

function renderResults(data, userKey) {
  var issues = data.issues || [];
  var unassigned = issues.filter(function(i) { return !i.assignee; });
  var assigned   = issues.filter(function(i) { return !!i.assignee; });
  var userName   = (selectedUser && selectedUser.displayName) || userKey || null;

  document.getElementById('chip-total').textContent      = data.total || issues.length;
  document.getElementById('chip-unassigned').textContent = unassigned.length;
  document.getElementById('chip-mine').textContent       = assigned.length;
  document.getElementById('chips').style.display         = 'flex';

  document.getElementById('results').innerHTML =
    '<div class="section">' +
      '<div class="section-header"><h3>⚠️ Sem responsável</h3><span class="tag tag-warning">' + unassigned.length + ' chamado' + (unassigned.length !== 1 ? 's' : '') + '</span></div>' +
      renderTable(unassigned) +
    '</div>' +
    '<div class="section">' +
      '<div class="section-header"><h3>👤 Atribuídos' + (userName ? ' a ' + userName : '') + '</h3><span class="tag tag-blue">' + assigned.length + ' chamado' + (assigned.length !== 1 ? 's' : '') + '</span></div>' +
      renderTable(assigned) +
    '</div>';
}

function syncKnownKeys() {
  setTimeout(function() {
    var links = document.querySelectorAll('.key-link');
    knownKeys = Array.prototype.map.call(links, function(l) { return l.textContent.trim(); });
    try { localStorage.setItem('notif_knownKeys', JSON.stringify(knownKeys)); } catch(e) {}
    if (notifAtivo) pushConfigToSW();
  }, 800);
}

// ── NOTIFICAÇÕES ─────────────────────────────────────────────────────────────
function getConfig() {
  return {
    vertical:  document.getElementById('sel-vertical').value,
    portfolio: document.getElementById('sel-portfolio').value,
    user:      inpUserVal.value,
    knownKeys: knownKeys
  };
}

function pushConfigToSW() {
  if (!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.ready.then(function(reg) {
    if (reg.active) reg.active.postMessage({ type: 'START_POLLING', payload: getConfig() });
  });
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.addEventListener('message', function(e) {
    if (!e.data) return;
    // Baseline definido na primeira execução — salva sem notificar
    if (e.data.type === 'BASELINE_SET') {
      knownKeys = e.data.allKeys;
      try { localStorage.setItem('notif_knownKeys', JSON.stringify(knownKeys)); } catch(ex) {}
      return;
    }
    if (e.data.type !== 'NEW_ISSUES') return;
    knownKeys = e.data.allKeys;
    try { localStorage.setItem('notif_knownKeys', JSON.stringify(knownKeys)); } catch(e) {}
    var novos = e.data.issues;
    document.querySelectorAll('.new-issues-banner').forEach(function(el) { el.remove(); });
    var label = novos.length === 1
      ? '1 novo chamado: <strong>' + novos[0].key + '</strong> — ' + novos[0].summary.slice(0, 70)
      : novos.length + ' novos chamados detectados';
    var banner = document.createElement('div');
    banner.className = 'new-issues-banner';
    banner.innerHTML = '🔔 ' + label + ' <button onclick="buscar()" style="margin-left:auto;background:var(--orange);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;font-weight:700">Atualizar lista</button>';
    document.getElementById('results').insertAdjacentElement('beforebegin', banner);
  });
}

function toggleNotificacoes() {
  if (notifAtivo) {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.ready.then(function(reg) {
        if (reg.active) reg.active.postMessage({ type: 'STOP_POLLING' });
      });
    }
    notifAtivo = false;
    updateNotifBtn();
    showToast('🔕 Alertas desativados.');
    return;
  }
  if (!('Notification' in window) || !('serviceWorker' in navigator)) {
    showToast('⚠️ Seu navegador não suporta notificações.'); return;
  }
  Notification.requestPermission().then(function(perm) {
    if (perm !== 'granted') { showToast('❌ Permissão de notificação negada.'); return; }
    var cfg = getConfig();
    if (!cfg.vertical && !cfg.portfolio && !cfg.user) {
      showToast('⚠️ Defina pelo menos um filtro antes de ativar os alertas.'); return;
    }
    try { localStorage.setItem('notif_config', JSON.stringify({vertical: cfg.vertical, portfolio: cfg.portfolio, user: cfg.user})); } catch(e) {}
    navigator.serviceWorker.register('/sw.js').then(function() {
      return navigator.serviceWorker.ready;
    }).then(function() {
      pushConfigToSW();
      notifAtivo = true;
      updateNotifBtn();
      showToast('✅ Alertas ativados! Você será notificado a cada 5 min.');
    });
  });
}

function updateNotifBtn() {
  document.getElementById('btn-notif').classList.toggle('active', notifAtivo);
  document.getElementById('notif-label').textContent = notifAtivo ? 'Alertas ativos' : 'Ativar alertas';
}

var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.classList.remove('show'); }, 3500);
}

// Restaura alertas ao recarregar
try {
  var savedCfg = localStorage.getItem('notif_config');
  if (savedCfg && Notification.permission === 'granted') {
    navigator.serviceWorker.register('/sw.js').then(function() {
      return navigator.serviceWorker.ready;
    }).then(function() {
      pushConfigToSW();
      notifAtivo = true;
      updateNotifBtn();
    });
  }
} catch(e) {}
</script>
</body>
</html>
